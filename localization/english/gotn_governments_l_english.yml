l_english:
 nomarchy:0 "Nomarchy"
 nomarchy_desc:0 "The Egyptian empire was divided into smaller regions called nomes, and rich nobles were assigned to look after each region and were therefore called Nomarchs."
 nomarchy_ruler:0 "Nomarch"
 nomarchy_ruler_female:0 "Nomarchess"
 nomarchy_consort:0 "Consort"

 egyptian_dynasty:0 "Pharonic Dynasty"
 egyptian_dynasty_desc:0 "Pharonic dynasties have a Pharaoh as the highest power. The Pharaoh is an absolute monarch who is considered divine themselves. An Egyptian dynasty claims all land typically associated with the Egyptian Nile."
 egyptian_dynasty_ruler:0 "Pharaoh"
 egyptian_dynasty_ruler_female:0 "Pharaoh"
 egyptian_dynasty_consort:0 "Consort of the Netjer"

 assyrian_imperium:0 "Assyrian Shalituta"
 assyrian_imperium_desc:0 "The governance of the Neo-Assyrian Empire has remained one of few establishments that remains intact from the crumbling state. Its ancient system of imperial divinity keeps the government stable."
 assyrian_imperium_ruler:0 "Shar"
 assyrian_imperium_ruler_female:0 "Sharrat"
 assyrian_imperium_consort:0 "Segallu"

 great_chiefdom_of_ma:0 "Great Chiefdom"
 great_chiefdom_of_ma_desc:0 ""
 great_chiefdom_of_ma_ruler:0 "Great Chief"
 great_chiefdom_of_ma_ruler_female:0 "Great Chief"
 great_chiefdom_of_ma_consort:0 "Great Consort"

 piratical_diarchy:0 "Piratical Diarchy"
 piratical_diarchy_desc:0 "A kingdom with two pirate kings, this absurdly rare government type was only able to happen in the specific conditions of privateers sponsored by a powerful state devolving into a hostile takeover of a whole country."
 piratical_diarchy_ruler:0 "Captain"
 piratical_diarchy_co_ruler:0 "First Mate"
 piratical_diarchy_consort:0 "Love Mate"
 piratical_diarchy_ruler_female:0 "Captain"

 daran_administration:0 "Darayan Realm"
 daran_administration_desc:0 "Since the reforms of Darayus, the Achaemenid Realm has been the forefront nation in regards to its handling of the lands it lords over, with an administrative system matched by close-to-none. It truly is a testament to Darayus' reforms!"
 daran_administration_ruler:0 "Xsayathiya Xsayathiyanam"
 daran_administration_ruler_female:0 "Mana-Pashni"
 daran_administration_consort:0 "Mana-Pashni"

 gaul_princely_state:0 "Drungus"
 gaul_princely_state_desc:0 ""
 gaul_princely_state_ruler:0 "Rixo"
 gaul_princely_state_ruler_female:0 "Riga"
 gaul_princely_state_consort:0 "Consort"

 jueyun_administration:0 "Dynastic Mandate"
 jueyun_administration_desc:0 "jueyun gov desc"
 jueyun_administration_ruler:0 "Heavenly Prince"
 jueyun_administration_ruler_female:0 "Princess"
 jueyun_administration_consort:0 "Princess"
 
 tyranny:0 "Tyranny"
 tyranny_desc:0 "Ever since the days of Cypselus, Pisitratus, and Periander, tyrants have become a Greek tradition. These rulers often have to resort to thuggery and foreign mercenaries, simply to keep their power. While tyrannies have generally gone out of favor, the absolute rule of one nevertheless remains an option, for those with the ambition to do so."
 tyranny_ruler:0 "Tyrannos"
 tyranny_ruler_female:0 "Tyrana"

 grand_republic:0 "Grand Republic"
 grand_republic_desc:0 "A republic of nearly absurd scale, a Grand Republic is a huge administrative body. Gone are the days of a body of citizens making decisions for a country. Laws are decided upon by elected representatives, and the Great Archon wields an immense amount of power. Democracy implemented on such a scale naturally appeases the masses."
 grand_republic_ruler:0 "Great Archon"
 
 league_republic:0 "League"
 league_republic_desc:0 "A League is a federalized state, usually representing various city states or regions, and granting them some degree of autonomy whilst still maintaining a central framework, uniting them all together. Leagues are especially common amongst the Greeks, where they are known as a 'Koinon'. Albeit to a lesser extent, leagues have been formed by the Hittite and Aramaic kingdoms, and the Faliscan and Latins of Italy."
 league_republic_ruler:0 "Archon"

 mercenary_republic:0 "Mercenary Republic"
 mercenary_republic_desc:0 "Mercenary Republics often come into existence as the result of a disgreement between a band of mercenaries and the former ruler of a territory or a group of mercenaries seeking treasure and conquest in foreign lands. Either way, Mercenaries Republics do not come about as the result of a peaceful agreement. These states often fall apart due to internal infighting, or being overthrown by an unhappy populous."
 mercenary_republic_ruler:0 "Commander"
 mercenary_republic_ruler_female:0 "Commander"
 mercenary_republic_co_ruler:0 "Lieutenant"
 mercenary_republic_co_ruler_female:0 "Lieutenant"

 pirate_republic:0 "Pirate Republic"
 pirate_republic_desc:0 "Seeking fortune and fame, pirates have become the ruling body of this territory. Found exclusively in coastal city-states, pirate republics are full of some of the most dastardly villains to be found in the four corners of the universe. A pirate's life is free, and with that comes the freedom to make profit as one sees fit, but also the freedom to cause trouble as one sees fit."
 pirate_republic_ruler:0 "Captain"
 pirate_republic_ruler_female:0 "Captain"
 pirate_republic_co_ruler:0 "First Mate"
 pirate_republic_co_ruler_female:0 "First Mate"

 adopt_indian_kingdom:0 "Adopt Janapada Governance"
 adopt_indian_kingdom_desc:0 "To truly become accepted among the many diverse peoples in the lands of and beyond the Indus, we must adopt their practices.\n\nThe #T Janapada#! system will let us adopt the #Y Caste Laws#!, incentivize #Y Integration#! over #Y Assimilation#!, and give us #E Indian Flavor Events#!."

 adopt_indian_republic:0 "Adopt Ganasangha Governance"
 adopt_indian_republic_desc:0 "$adopt_indian_kingdom_desc$\n\nThe #G Ganasangha#! system will let us adopt the #Y Caste Laws#!, incentivize #Y Integration#! over #Y Assimilation#!, and give us #E Indian Flavor Events#!"

 mahajanapada_monarchy:0 "Mahajanapada"
 mahajanapada_monarchy_desc:0 "The Janapadas were and are important states that have existed since the beginning of the post-vedic period. These great kingdoms carry a prestige with them that define the Indian Kingdom as a distinct governance than that of western kings."
 mahajanapada_monarchy_ruler:0 "Maharaja"
 mahajanapada_monarchy_ruler_female:0 "Maharani"
 mahajanapada_monarchy_consort:0 "Raja"
 mahajanapada_monarchy_consort_female:0 "Rani"

 ganasangha_republic:0 "Mahajanapada"
 ganasangha_republic_desc:0 "The Janapadas were and are important states that have existed since the beginning of the post-vedic period. These great kingdoms carry a prestige with them that define the Indian Kingdom as a distinct governance than that of western kings."
 ganasangha_republic_ruler:0 "Maharaja"
 ganasangha_republic_ruler_female:0 "Maharani"
 ganashanga_republic_consort:0 "Rani"

 ascetic_party:0 "Ascetic Assembly"
 ascetic_party_short:0 "Ascetics"
 ascetic_party_description:0 "The Ascetic Assembly represents the wisdom and experience of the republic's Shramanic members. Their influence stems from their role in promoting Ascetic traditions and guiding policy through dharmic principles."

 kshatriya_party:0 "Kshatriya Clan Chiefs"
 kshatriya_party_short:0 "Kshatriya"
 kshatriya_party_description:0 "The Kshatriya Clan Chiefs comprises the martial clans and tribes responsible for the republic’s defense. Their voice is strongest in times of conflict, and they advocate for discipline, honor, and readiness."

 brahmin_party:0 "Brahmanical Council"
 brahmin_party_short:0 "Brahmans"
 brahmin_party_description:0 "The Brahmanical Council represents the priestly elite and ritual orthodoxy. They advocate for the preservation of Vedic traditions, caste hierarchy, and cosmic order through sacred rites."

 republic_button_empower_faction_loc_ascetic_party:0 "Fund Dharma Schools"
 republic_button_empower_faction_desc_loc_ascetic_party:0 "By funding institutions that teach dharma and civic ethics, we strengthen the influence of the Assembly and promote social harmony.\n\nThis can be used once every 10 years, and only if you have not used '$republic_button_empower_faction_loc_kshatriya_party$'."

 republic_button_empower_faction_loc_kshatriya_party:0 "Expand Royal Training"
 republic_button_empower_faction_desc_loc_kshatriya_party:0 "Investing in martial academies and warrior guilds will empower the Kshatriya Clan Chiefs and ensure our republic remains secure.\n\nThis can be used once every 10 years, and only if you have not used '$republic_button_empower_faction_loc_brahmin_party$'."

 republic_button_empower_faction_loc_brahmin_party:0 "Support Local Temples"
 republic_button_empower_faction_desc_loc_brahmin_party:0 "By granting land and privileges to our priests, we secure the loyalty of the Brahmins and those who benefit from them.\n\nThis can be used once every 10 years."

 empowered_ascetic_gui_mod:0 "Empowered Ascetics"
 empowered_kshatriya_gui_mod:0 "Empowered Kshatriyas"
 empowered_brahmin_gui_mod:0 "Empowered Brahmins"

 monthly_ascetic_conviction:0 "Monthly Ascetic Conviction"
 monthly_kshatriya_conviction:0 "Monthly Kshatriya Conviction"
 monthly_brahmin_conviction:0 "Monthly Brahmin Conviction"

 republic_military_recruitment_ganasangha_laws:0 "Military Organization"
 republic_military_recruitment_ganasangha_1:0 "Warrior Assembly Levy"
 republic_military_recruitment_ganasangha_1_desc:0 "The Kshatriyas favors disciplined and locally trained fighters. By prioritizing their martial traditions, we gain a reliable and proud fighting force."
 republic_military_recruitment_ganasangha_2:0 "Guild Militia"
 republic_military_recruitment_ganasangha_2_desc:0 "The Brahmins promote using religious conviction from artisans and farmers. Though less trained, they offer numbers and adaptability."
 republic_military_recruitment_ganasangha_3:0 "Warrior Monks"
 republic_military_recruitment_ganasangha_3_desc:0 "The Assembly of Ascetics maintains a small but elite guard, trained in traditional tactics and dharmic discipline. Their forces are few but highly respected."
 republic_military_recruitment_ganasangha_4:0 "Unified Sangha Army"
 republic_military_recruitment_ganasangha_4_desc:0 "By standardizing our military across the sangha, we ensure strategic cohesion and better command over our generals."

 corruption_ganasangha_laws:0 "Sangha Assembly Laws"
 republic_corruption_ganasangha_2:0 "Empower the Sangha"
 republic_corruption_ganasangha_2_desc:0 "Expanding representation in the sangha ensures that all clans feel heard, fostering unity and reducing unrest."
 republic_corruption_ganasangha_1:0 "Traditional Sabha"
 republic_corruption_ganasangha_1_desc:0 "Our traditional sabha system has long upheld justice. Maintaining it preserves our identity and stability."
 republic_corruption_ganasangha_3:0 "Appoint Dhamma Envoys"
 republic_corruption_ganasangha_3_desc:0 "By appointing respected elders as dhamma envoys, we promote harmony between clans and strengthen ties with neighboring states."
 republic_corruption_ganasangha_4:0 "Limit Assembly Powers"
 republic_corruption_ganasangha_4_desc:0 "To ensure swift governance, we must curtail the sangha’s ability to obstruct executive decisions."

 republic_election_ganasangha_reforms:0 "Election Reforms"
 republican_election_ganasangha_1:0 "Rotational Leadership"
 republican_election_ganasangha_1_desc:0 "Leadership rotates among clans to ensure fairness and prevent dominance by any one group."
 republican_election_ganasangha_2:0 "Extended Tenure"
 republican_election_ganasangha_2_desc:0 "Longer terms allow leaders to implement lasting reforms and maintain continuity."
 republican_election_ganasangha_3:0 "Shortened Tenure"
 republican_election_ganasangha_3_desc:0 "Frequent elections prevent stagnation and ensure accountability to the sangha."
 republican_election_ganasangha_4:0 "Emergency Rule"
 republican_election_ganasangha_4_desc:0 "In times of crisis, the sangha may suspend elections to preserve order and unity."

 republic_religious_ganasangha_reforms:0 "Religious Reforms"
 republican_religious_ganasangha_1:0 "Local Worship Encouraged"
 republican_religious_ganasangha_1_desc:0 "Whether a devout believer of Agni, a worshipper of Shiva, or a pursuer of Dharma, the state cares not."
 republican_religious_ganasangha_2:0 "Cave Rights"
 republican_religious_ganasangha_2_desc:0 "Shramanic Orders teach through silence and solitude. Let us grant them the preferential exclusive right to dwell in caves, where thought echoes truest."
 republican_religious_ganasangha_3:0 "Expand Brahmin Temple Rights"
 republican_religious_ganasangha_3_desc:0 "The Brahmin caste is most suited to religious ordinances, and thus should have sole authority over all thing divine."
 republican_religious_ganasangha_4:0 "Sword Superiority"
 republican_religious_ganasangha_4_desc:0 "While the thinkers of faith debate, the men of the sword battle, and they shall not be impeded. For without the sword, the books will burn."

 ganasangha_republic:0 "Ganasangha"
 ganasangha_republic_desc:0 "The Ganasangha is a republican form of governance rooted in dharmic tradition and clan-based assemblies. Although they started out as periphery states within or around larger Mahajanapadas, the lack of centralization has allowed these Ganasanghas to thrive and develop into a new form of Aristocratic and Kshatriya based republics."

 ganasangha_republic_ruler:0 "Sanghamukhya"
 ganasangha_republic_ruler_female:0 "Sanghamukhya"

 epirote_republic:0 "Epirote League"
 epirote_republic_desc:0 "A form of governance unique to the Epirote tribes, the league represents the various Epirote tribes. Each tribe is represented in the Epirote assembly by ten elected officals from amongst their tribe. Each tribe rules their respective land in a mostly autonomous fashion, with the elected Prostratas having some powers over them, mostly the power to declare wars, raise armies, and to direct construction projects. Such a system has created a strong, unified Epirote state, reducing some of the shortfalls of other republics."
 epirote_republic_ruler:0 "Prostratas"
 epirote_republic_ruler_female:0 "Prostratas"
 
 molossian_dictator_tt:0 "Dictator from the Molossians:"
 molossian_party:0 "Molossians"
 molossian_party_short:0 "Molossians"
 molossian_party_description:0 "The Molossians are the most revered and powerful of the Epirote tribes, claiming their descent from the hero Molossus, one of the three sons of Neoptolemus, who himself was a son of Achilles. The Molossians are renowned for their hounds, and for their tact in warfare and diplomatic policy."
 thesprotian_party:0 "Thesprotians"
 thesprotian_party_short:0 "Thesprotians"
 thesprotian_party_description:0 "The Thesprotians are the controllers of the Dodona Oracle, something that has given them immense political influence over their neighbors. It is with this power that they were able to control the southern portion of Epirus."
 chaonian_party:0 "Chaonians"
 chaonian_party_short:0 "Chaonians"
 chaonian_party_description:0 "The Chaonians claim they are named after the Trojan war hero Chaon, who traveled to Epirus with Helenus. The Chaonians inhabit the northern reaches of Epirus, the least inhabited and the most rural. Their mostly pastoralist way of life has given them great prosperity, and their people are lauded for their hardy and stable way of life."
 republic_button_empower_faction_loc_molossian_party:0 "Improve Soldier Training"
 republic_button_empower_faction_desc_loc_molossian_party:0 "Always concerned with the current state of our soldiers, the Molossians seek to improve our current training standards and equipment. Naturally, some of the money supposed to be used for troop upkeep will go right into the pockets of the Molossians, securing their loyalty.\n\nThis can be used once every 10 years, and only if you have not used '$republic_button_empower_faction_loc_chaonian_party$'."
 republic_button_empower_faction_loc_thesprotian_party:0 "Make Divine Offerings"
 republic_button_empower_faction_desc_loc_thesprotian_party:0 "Making offerings to the divine will help to incur favor with the Thesprotians. Their control of Epirote religous institions are especially influential.\n\nThis can be used once every 10 years."
 republic_button_empower_faction_loc_chaonian_party:0 "Expand Agriculture"
 republic_button_empower_faction_desc_loc_chaonian_party:0 "Increasing not only the estates of our farmers, but also their rights, will ensure the increased prosperity and stability of our nation.\n\nThis can be used once every 10 years, and only if you have not used '$republic_button_empower_faction_loc_molossian_party$'."
 empowered_molossians_gui_mod:0 "Empowered Molossians"
 empowered_thesprotians_gui_mod:0 "Empowered Thesprotians"
 empowered_chaonians_gui_mod:0 "Empowered Chaonians"
 monthly_chaonian_party_conviction:0 "Monthly Chaonians Conviction"
 monthly_molossian_party_conviction:0 "Monthly Molossians Conviction"
 monthly_thesprotian_party_conviction:0 "Monthly Thesprotians Conviction"

 republic_military_recruitment_epirus_laws:0 "Military Organization"
 republic_military_recruitment_epirus_3:0 "Tribal Levy"
 republic_military_recruitment_epirus_3_desc:0 "By relying on a variety of soldiers from our tribes, we will always have a dedicated and supple fighting force."
 republic_military_recruitment_epirus_1:0 "Chaonian Levy"
 republic_military_recruitment_epirus_1_desc:0 "The Chaonians prefer superiority in numbers. By encouraging recruitment and expediting training time, we will be able to maintain a larger army, and have a larger pool of soldiers to draw from."
 republic_military_recruitment_epirus_2:0 "Molossian Levy"
 republic_military_recruitment_epirus_2_desc:0 "The Molossians are an especially martial and warlike people, even amongst the Epirotes. By primarily using skilled Molossian hoplites, the prowess of our army would rival that even of the Thebans or Spartans. Relying on such a small group to provide for our defense would leave us with a signifcantly reduced fighting force."
 republic_military_recruitment_epirus_4:0 "Standardized Army"
 republic_military_recruitment_epirus_4_desc:0 "Because of the nature of our land, our prestigious soldiers have fought using varied tactics. A standardization of a central, Epirote army would allow us to best adapt to our rugged terrain, and to better control our generals."
 corruption_epirus_laws:0 "Synedrion Endorsement"
 republic_corruption_epirus_2:0 "Epirote Assembly"
 republic_corruption_epirus_2_desc:0 "Our traditonal method of assembly has served us well. By having representation for each of our tribes in the synedrion, no one will be able to deny the just and fair nature of our league."
 republic_corruption_epirus_3:0 "Encourage Proxenoi"
 republic_corruption_epirus_3_desc:0 "By sponsoring the wealthy and charismatic amongst our people to act as Proxenoi, these informal ambassadors to other cities will not only encourage friendship between the more disparate tribes amongst us, we will be able to establish good relations with our neighbors, and trade between us will flow more readily."
 republic_corruption_epirus_1:0 "Empower the Synedrion"
 republic_corruption_epirus_1_desc:0 "Increasing the amount of representatives in our synedrion will satiate the masses."
 republic_corruption_epirus_4:0 "Limit the Synedrion"
 republic_corruption_epirus_4_desc:0 "The affairs of our elected officals have oftentimes gotten in the way of the ambitions of our Prostratas. Abolishing the power of the synedrion to pass judgement on our government will eliminate this issue."

 republic_election_epirus_reforms:0 "Election Reforms"
 republican_election_epirus_1:0 "Traditional Model"
 republican_election_epirus_1_desc:0 "Designed to ensure fairness and equal representation, this model of the electoral system is held in high regard."
 republican_election_epirus_2:0 "Extended Terms"
 republican_election_epirus_2_desc:0 "Sometimes, one term is just not enough for our great leaders to achieve what they set out to do. It has become clear that we must consider extending their tenure, that we might reap the benefits of our benign leader's wisdom."
 republican_election_epirus_3:0 "Shortened Terms"
 republican_election_epirus_3_desc:0 "It has become clear that power promotes the worst aspects of mankind. In an effort to combat this creeping corruption, we should reduce the electoral term, ensuring that no one man wields power for too long."
 republican_election_epirus_4:0 "Wartime Leadership"
 republican_election_epirus_4_desc:0 "The wisdom of our noble leaders is required indefinitely in order to safeguard against corruption from within as well as foreign interference. This is the only way our citizens and merchants will be able to thrive and prosper!"

 republican_tyranny_reforms:0 "Tyrannical Rule"
 republican_tyranny_reforms_1:0 "Tyrannical Neutrality"
 republican_tyranny_reforms_1_desc:0 "The tyrant was not an inherently negative figure. It was often seen as a neccesary step in any democracy."
 republican_tyranny_reforms_2:0 "Tyrannical Strong-Arming"
 republican_tyranny_reforms_2_desc:0 "A common feature of any tyrant was their control and dominance over the military. Many were often popular war heroes, but some would use their power to seize control, going against the wishes of the populous."
 republican_tyranny_reforms_3:0 "Tyrannical Populism"
 republican_tyranny_reforms_3_desc:0 "Tyrants oftentimes gained their power via the support of the lower classes. Of course, such outward support of the common man is likely to anger the aristocrats."
 republican_tyranny_reforms_4:0 "Tyrannical Kingship"
 republican_tyranny_reforms_4_desc:0 "By proclaiming our leader to be a king, we may elevate ourselves from the trappings of a democracy."

 monarchy_lydia_economic_laws:0 "Taxation Laws"
 land_tithe_lydia:0 "Lydian Coinage"
 land_tithe_lydia_desc:0 "Our ancient system of taxation and coinage has proved it's worth. But the allure of wealth is very tempting.."
 monarchy_lydia_religious_laws:0 "Assimilation Policies"
 religious_tolerance_lydia:0 "Religous Acceptance"
 religious_tolerance_lydia_desc:0 "Acceptance of other religions has always been our policy. Amongst the upper classes, worship of the Greek gods was commonplace, Lydian kings have a history of asking the oracle of Delphi for guidance on many matters."
 religious_integration_efforts_lydia:0 "Elevate Priesthood"
 religious_integration_efforts_lydia_desc:0 "By elevating the status of our priests, we will be able to propagate the spread of our deities."
 monarchy_religious_mandate_military_lydia:0 "Merchant Colonies"
 monarchy_religious_mandate_military_lydia_desc:0 "An Assyrian practice, we could learn from their ways. By creating merchant colonies, we will not only be able to spread our culture, but be able to benefit from more trade contacts."
 monarchy_military_reforms_lydia:0 "Military Reforms"
 relaxed_recruiting_standards_lydia:0 "Astarhos Conscription"
 relaxed_recruiting_standards_lydia_desc:0 "By relying on our subjects for soldiers, we will not only always have a ready body of troops, but we will not have to waste precious Lydian lives."
 mercenary_reliance_lydia:0 "Institutionalized Mercenaries"
 mercenary_reliance_lydia_desc:0 "Mercenaries have always been an important part of the Lydian military. Our wealth is obscene, and why should we use our own troops, and the unreliable troops of our subjects when we can simply hire as many as we want?"
 

