l_english:

 ## Americanist ##
 americanist:0 "Americanist"
 desc_americanist:0 "placeholder"

 ## Christian Faiths ##
 evangelical:0 "Evangelical"
 desc_evangelical:0 "The Evangelical Church is the main claimant to the legacy of antediluvian United States Protestantism. In the face of post-Deluge upheavals, various Protestant churches banded together, putting aside minor theological differences in favor of establishing an Evangelical Convention of Churches presided over by an ecumenical council of bishops. However, some Christians chafe against the doctrines and restrictions imposed by this Convention..."

 catholic:0 "Catholic"
 desc_catholic:0 "After the Deluge, the surviving Catholic hierarchy in America was given a miraculous sign at the Council of Chicago that confirmed the destruction of the Papacy in Rome; giving the surviving American cardinals the right to hold a papal conclave. The new American Popes lacked a permanent temporal seat for over a century - a period known as "the Wandering Papacy" - until control over the city of Chicago in Illinois was finally achieved. With this newfound authority came a gradual solidification of power, with many formerly independent churches of varying denominations entering communion with the Papacy for various reasons; their traditions being subsumed in the process."

 lutheran:0 "Lutheran"
 desc_lutheran:0 "Born from the teachings of the ancient Martin Luther who lends the movement its name, Lutherans hold many of the same practices as pre-Reformation Christendom, but reject the centralized nature of the Catholic Church as a corrupt entity in favor of decentralized congregations. These congregations solve disputes and dilemmas through conference rather than relying on the decision of a single religious authority. In the wake of the Event, Lutheranism receded greatly, with many of the remaining congregations putting aside differences between one another against the Catholic and Viking ascendancy."

 old_order:0 "Old Order"
 desc_old_order:0 "The Old Order are a collection of groups of Conservative Amish, Mennonites, and Brethren, focused on separation from the outside or 'English' world, a principle of nonviolence, and plain living. These tenets make life after the apocalypse difficult and often quite short. Due to the religious violence and general chaos inherent to the post-Deluge social order, the Old Order has abandoned its former practice of absolute pacifism, but members still strive to avoid violent conflict whenever possible. Using violence in any context - even self-defense - is highly discouraged."

 united_church:0 "United Church"
 desc_united_church:0 "Originally one of the many offshoots of Protestant Christianity in Toronto, the United Church differs from its fellows by its belief that the Holy Spirit acts through all faiths, and that God's will therefore is best understood through dialogue with other creeds. Through inter-faith services, adherents invite members of other faiths into their holy spaces to perform their own rituals, so as to open new pathways to the divine. The Church retains many elements of traditional Protestant Christianity, believing that the Bible is God's most direct revelation to humankind, and that Communion is a holy act."

 unitarian_universialism:0 "Unitarian Universialism"
 desc_unitarian_universialism:0 "Unitarian Universalists assert no creed, but instead, are united behind a shared search for spiritual growth. Unitarians are guided by their 'living tradition' - that is, by a number of documents open to reading, reinterpretation and reworking. These various traditions give way to inspiration and insight taken from all religions, although special regard for intellectual freedom and inclusive love above other elements of theology."

 ## Industrialist ##
 promethean:0 "Promethean"
 desc_promethean:0 "One of the first faiths to emerge after the Great Rusting, the Prometheans seek to restore the Gilded Age through the powers of the Titan Kings. They believe that during that time, the world was divided amongst the titans, who served as intermediaries between Industry and the workers. They channeled the labor of the people to Industry and the prosperity of Industry back to the workers. Now that responsibility falls to their descendants, who seek to recreate the ancient society in all its forms and usher in a new Gilded Age."

 ## Afro-Diasporic Faiths ##
 vodou:0 "Vodou"
 desc_vodou:0 "Vodou originated in Haiti, and is a mixture of ancient West African beliefs and Catholicism. Vodouists are distinguished by their lack of formal organization and slightly closer relationship to mainstream Christianity. Vodouists also place less of an emphasis on communication with the dead, focusing instead on worship of the loas."
 
 ## Vernacular ## 
 revelationist:0 "Revelationist"
 desc_revelationist:0 "Revelationists believe that when the many forces of Heaven and Hell began the War of Tribulation, the once prosperous Earth was engulfed in spiritual and material chaos. These powerful multitudes fought to a stalemate, and became the powers with dominion over the Earth, calling the dead to become angels or demons to assist their side in the conflict. The faith itself involves delivering fiery sermons regarding divinely revealed concepts and commands which have been given by the forces of heaven. Adherents' nigh-polytheistic reverence for many biblical figures, emphasis of supernatural over textual authority, and integration of snake handling into ceremonies marks them as a distinct folk religion under little more than a veneer of Christianity."
 
 springsearcher:0 "Springsearcher"
 desc_springsearcher:0 "Born from the many myths and legends told in the unruly Floridian Peninsula, the Springsearchers tell stories of the hidden Fountain of Youth, said to grant immortality to any who find it. Those who do so become like the Immortal One and join Him in Paradise, where they fight against the embodiment of death and destruction, the Infernal Python. To earn the honor of locating the Fountain and the boon it brings, Springsearchers strive to truly live, emulating legendary figures such as Ponce DeLeon and Apollo Strongarm who discovered the Fountain and now guard against the dangerous gods of the untamed wilds."

 omenteller:0 "Omenteller"
 desc_omenteller:0 "Crawling out of the hills and hollers of the Appalachians, came the Omentellers. Their prophets spoke the culture, religion, legends, and history of the Appalachians into a new folk tradition. The creed places strong emphasis on fate, divine prophecy, and the fluidity of existence. This is in stark contrast to their animalistic pantheon, made up of enigmatic figures whose inscrutable wills must be determined through esoteric practices. Fate is tested by ceremonial handling of serpents, speaking in tongues, and the interpretation of divine apparitions. The foreboding shelter of their mountain homes acts as the greatest demonstration of the ominous wonder that the Omenteller faithful embrace through their religion."
 
 ophiolatry:0 "Ophiolatry"
 desc_ophiolatry:0 "Hatching from the brutal nest that was the Tyrant King's wondrous Desolation of the ancient empires of vice, slithered out the Ophiolatrists. Believing that Adam and Eve's original sin plunged humanity into a crude imitation of the pre-Fall Paradise, the faithful atone for this by recreating the splendid wonders of stone that once stood in the Garden of Eden. Atop these glorious structures, their priests deliver scorching condemnations of mankind's sin, punctuated by human sacrifices. They carry out these dreadful efforts to glorify their reptilian masters and advance the faith's mission to revive civilization as it was when the earth was young. Marked by literal interpretations of their eclectic oral and textual traditions, Ophiolatrists hope that the magnificent works and unshakable devotion that they have for their gods will earn them grace with the Serpent in the Wilderness when their sinful nature is inevitably judged."

 hearthtender:0 "Hearthtender"
 desc_hearthtender:0 "In the chaos of the tumultuous post-[the Event|Fall]] world, the ties of family are essential for survival. According to the Hearthtenders, it is women, particularly mothers, who the Father has chosen to keep these bonds of kinship sturdy against the onslaught of the Enemy. Empowered by the strength of the Feminine Spirit, it is the sacred duty of women to battle Evil after the inadequacy of man was laid naked. Yet, the faithful do not fight alone, for the Spirit has elevated various paragons of womanhood into angelic service, where they now take action on earth to help the righteous in their struggle to safeguard the Heavenly Family. This maternal fierceness is tempered by hospitality, because it is a woman's duty to both build and safeguard the hearth, so that there is always a home worth protecting."

 ## Lacustrine ##

 viking:0 "Viking"
 desc_viking:0 "Vikings believe that the World is a struggle full of victory and defeat that culminates in Ragnarok. In order to ensure success during the next Ragnarok, adherents have developed a culture driven by those who are the strongest in their societies. The faithful spend their whole lives pushing themselves to their limit in order to prove to High Coach Thor that they are worthy of joining him in Valhallafame. Vikings believe that their indomitable warrior spirit will carry them to their next victory in a continuing cycle of competition and violence."
 
 lakeshore:0 "Lakeshore"
 desc_lakeshore:0 "The Lakeshore faithful believe that existence is dictated by a series of heavily intertwined and complex cycles, chief among them the process of love and anger which the water of the Lakes undergoes. Over the course of a year, she will cycle between being the Lady or the Witch, both giving and taking life as effortlessly as the waves cresting upon the shore, depending on her mood. Lakefolk see everything as having a spirit, and they revere many in their large cosmology. However, the greatest among them is Polaris, the Great Keeper-Spirit who remains everlasting across every cycle. Responsible for bestowing the gift of Eternal Light upon the world, Polaris will always try to guide adherents safely to their destinations, despite all the turmoil which the living must undoubtedly face."
 
 ## Atlantean ##
 
 egyptology:0 "Egyptology"
 desc_egyptology:0 "The fall of the great Atlantis, while tragic, did leave behind an heir to their civilization which would become a rival to their profound majesty and heavily influence the progress of the Americas. This society was Egypt. This lost nation serves as the spiritual basis for the Egyptologists, who seek to regain its cosmic power and to recreate their grand pyramids. The movement focuses its worship around the sun god Ra's divine knowledge and destinies which He and other celestial beings have given to humanity across history, attempting to use this enlightenment to act as stewards of Egypt's legacy. The faithful also try to decode the scriptures of other religions, unlocking hidden meanings and revealing the truth that Egyptian civilization is actually the root of all cultures and faiths across the world. Once the truth of Egyptian ascendancy is revealed, a new age of spiritual and technological mastery will begin again"

 ozymandism:0 "Ozymandism"
 desc_ozymandism:0 "Across dusty stretches of the Midwest, the hopes for a brighter future shine brilliant green. In the wake of the collapse of both previous attempts at reaching perfection, the Land of Oz and antique America respectively, the Ozymandians defy probability and dream of finally attaining Utopia. The faithful believe that every glorious society is guided by a collection of spiritual principles and celestial forces known as Oz, and that by internalizing the meaning of these concepts a people can be guided in building Utopia on Earth. This sweeping vision involves not only the equality of men and women, but also the shared harmony of all in society. Believers refuse to integrate with the unguided nations, although they have no qualms with bringing the power of Civilization against Barbarism when it is deemed necessary. To the Ozymandians, there is no cost or adversity too great to prevent the creation of their true emerald Utopia."

 ## Veteranic ##
 
 veteranic:0 "Veteranic"
 desc_veteranic:0 "The world was cast in an endless war of horror, The War to End All, there were terrible people on all sides, a war fought by greed and malus. Brought on by the slow corruption by the Tempter, and helped along by The Omnipotent, Omnipresent, Reaper of Flanders and his Horsemen. A war that had been building since the Original Sin itself, when Cain struck down Abel in a fit of rage, and man first split his kin's blood.\n\nBut in this endless sea of horror, young men dying and spilling their blood in every corner of the earth, came a figure. The Unknown Saviour, the coming of the Trinity in one form upon the earth. Unlike the first coming however there was no great following in his life. Christ would die surrounded by fellow men, yet at the same time unknown. In No-Man's Land he fell, slain by an unknown Hun after he was ordered with his fellow soldiers to go over the top. As Christ's blood ran into the soil the first Poppies burst forth from the earth. His individual death was not known, was not heralded. But as God lay dying in the mud, the Holy Sprit left his body and entered the souls of every soldier on one side of the great and terrible war, blessing them, and granting them the holy knowledge that they must end this war. Not to win glory, but to save mankind.\n\nAs the soldiers of God's Entente pushed forward through hell, backed by mighty figures like the Angel of Vimy and mighty sea-bound Aichemes, the Tempters own puppets the Kaisers, Kaiser Attila, Kaiser Wilhelm, and Kaiser Hitler, sent the downtrodden and poor Huns to fight on their behalf. But no matter the innocence of the individual soldier, the forces of the Allies of Christ knew they must end this war, against the Kaisers, they must push against the Horsemen of the Omnipotent Reaper of Flanders, Conquest, War, Pestilence, and Famine, with the Horsemen of the Unknown Saviour, Peace, Prosperity, Progress, and Plenty, they must above all fight against Tyranny and Evil."

 ## Occultist ##
 
 fathomless:0 "Fathomless"
 desc_fathomless:0 "Along the mist-sprayed, rocky shores of New England, the followers of Fathomless Occultery believe they keep the fragile equilibrium of the world in balance. They stand as guardians, shrouded in the cold, dark aura that echoes the desolate whispers of a forsaken enlightenment. The Deep Ones, beckoned by the recklessness of the Old World's so-called Great Awakening, destroyed the Old World that forsook the ancient safeguards, leaving the pitiful few who tended to the Lights to seek refuge on these shores. The faithful's aversion to outsiders and their ideas serves as a crucial linchpin in maintaining the delicate balance of the New World, for any lapse of vigilance may cause the Lights to falter, and the protective barrier that wards the Deep Ones will collapse to usher in an era of intractable madness, unending famine, and unfathomable terror that shall consume the New World."

 gothic:0 "Gothic"
 desc_gothic:0 "In the heart of ancient New England woods, where shadows dance like moonlit specters, Gothic Occultery unfolds in the hidden clearings and burnt-out hearths where winds whisper secrets that only the gifted and chosen can fully comprehend. The faithful find solace in the haunted echoes of elder tales, where the lines between good and evil become invisible in the darkness. Madness, a mantle worn by the outside world, finds no place here; for the faithful, clarity and protection is found through communion with the strange forces that govern the universe. The Ageless Stranger, the enigmatic link between mortals and the Old Ones, is the conduit through which the influence of these powers are felt and utilized. Though... always at a price."

 ## Woodlands ##
 
 midewiwin:0 "Midewiwin"
 desc_midewiwin:0 "Midewiwin, or the "Spiritual Mystery", is the traditional religion of many Native American groups in the Great Lakes area and beyond. Followers of Midewiwin believe that the Event, or the "Seventh Fire", marked the start of a new era for Native Americans across North America, a time for reclamation of both land and spirituality. The center of Midewiwin practice is the "medicine lodge", where initiated priests conduct rites of ceremony and passage for their people."