 ## Americanist ##
 americanist:0 "Americanist"
 desc_americanist:0 "placeholder"

 ## Christian Faiths ##
 evangelical:0 "Evangelical"
 desc_evangelical:0 "The Evangelical Church is the main claimant to the legacy of antediluvian United States Protestantism. In the face of post-Deluge upheavals, various Protestant churches banded together, putting aside minor theological differences in favor of establishing an Evangelical Convention of Churches presided over by an ecumenical council of bishops. However, some Christians chafe against the doctrines and restrictions imposed by this Convention..."

 catholic:0 "Catholic"
 desc_catholic:0 "After the Deluge, the surviving Catholic hierarchy in America was given a miraculous sign at the Council of Chicago that confirmed the destruction of the Papacy in Rome; giving the surviving American cardinals the right to hold a papal conclave. The new American Popes lacked a permanent temporal seat for over a century - a period known as "the Wandering Papacy" - until control over the city of Chicago in Illinois was finally achieved. With this newfound authority came a gradual solidification of power, with many formerly independent churches of varying denominations entering communion with the Papacy for various reasons; their traditions being subsumed in the process."

 ## Industrialist ##
 promethean:0 "Promethean"
 desc_promethean:0 "One of the first faiths to emerge after the Great Rusting, the Prometheans seek to restore the Gilded Age through the powers of the Titan Kings. They believe that during that time, the world was divided amongst the titans, who served as intermediaries between Industry and the workers. They channeled the labor of the people to Industry and the prosperity of Industry back to the workers. Now that responsibility falls to their descendants, who seek to recreate the ancient society in all its forms and usher in a new Gilded Age."

 ## Afro-Diasporic Faiths ##
 vodou:0 "Vodou"
 desc_vodou:0 "Vodou originated in Haiti, and is a mixture of ancient West African beliefs and Catholicism. Vodouists are distinguished by their lack of formal organization and slightly closer relationship to mainstream Christianity. Vodouists also place less of an emphasis on communication with the dead, focusing instead on worship of the loas."
 
 ## Vernacular ## 
 revelationist:0 "Revelationist"
 desc_revelationist:0 "Revelationists believe that when the many forces of Heaven and Hell began the War of Tribulation, the once prosperous Earth was engulfed in spiritual and material chaos. These powerful multitudes fought to a stalemate, and became the powers with dominion over the Earth, calling the dead to become angels or demons to assist their side in the conflict. The faith itself involves delivering fiery sermons regarding divinely revealed concepts and commands which have been given by the forces of heaven. Adherents' nigh-polytheistic reverence for many biblical figures, emphasis of supernatural over textual authority, and integration of snake handling into ceremonies marks them as a distinct folk religion under little more than a veneer of Christianity."
 
 springsearcher:0 "Springsearcher"
 desc_springsearcher:0 "Born from the many myths and legends told in the unruly Floridian Peninsula, the Springsearchers tell stories of the hidden Fountain of Youth, said to grant immortality to any who find it. Those who do so become like the Immortal One and join Him in Paradise, where they fight against the embodiment of death and destruction, the Infernal Python. To earn the honor of locating the Fountain and the boon it brings, Springsearchers strive to truly live, emulating legendary figures such as Ponce DeLeon and Apollo Strongarm who discovered the Fountain and now guard against the dangerous gods of the untamed wilds."

 omenteller:0 "Omenteller"
 desc_omenteller:0 "Crawling out of the hills and hollers of the Appalachians, came the Omentellers. Their prophets spoke the culture, religion, legends, and history of the Appalachians into a new folk tradition. The creed places strong emphasis on fate, divine prophecy, and the fluidity of existence. This is in stark contrast to their animalistic pantheon, made up of enigmatic figures whose inscrutable wills must be determined through esoteric practices. Fate is tested by ceremonial handling of serpents, speaking in tongues, and the interpretation of divine apparitions. The foreboding shelter of their mountain homes acts as the greatest demonstration of the ominous wonder that the Omenteller faithful embrace through their religion."
 
 ophiolatry:0 "Ophiolatry"
 desc_ophiolatry:0 "Hatching from the brutal nest that was the Tyrant King's wondrous Desolation of the ancient empires of vice, slithered out the Ophiolatrists. Believing that Adam and Eve's original sin plunged humanity into a crude imitation of the pre-Fall Paradise, the faithful atone for this by recreating the splendid wonders of stone that once stood in the Garden of Eden. Atop these glorious structures, their priests deliver scorching condemnations of mankind's sin, punctuated by human sacrifices. They carry out these dreadful efforts to glorify their reptilian masters and advance the faith's mission to revive civilization as it was when the earth was young. Marked by literal interpretations of their eclectic oral and textual traditions, Ophiolatrists hope that the magnificent works and unshakable devotion that they have for their gods will earn them grace with the Serpent in the Wilderness when their sinful nature is inevitably judged."

 hearthtender:0 "Hearthtender"
 desc_hearthtender:0 "In the chaos of the tumultuous post-[the Event|Fall]] world, the ties of family are essential for survival. According to the Hearthtenders, it is women, particularly mothers, who the Father has chosen to keep these bonds of kinship sturdy against the onslaught of the Enemy. Empowered by the strength of the Feminine Spirit, it is the sacred duty of women to battle Evil after the inadequacy of man was laid naked. Yet, the faithful do not fight alone, for the Spirit has elevated various paragons of womanhood into angelic service, where they now take action on earth to help the righteous in their struggle to safeguard the Heavenly Family. This maternal fierceness is tempered by hospitality, because it is a woman's duty to both build and safeguard the hearth, so that there is always a home worth protecting."