l_english:
 federal:0 "Federal"
 federal_desc:0 "Representing the government of the pre-Event United States, the Federal Government is heavily legalistic, with the three branches, Executive, Legislative, and Judicial, all having checks and balances against the other branches, and each branch plays their part in representing the people."
 federal_ruler:0 "President"
 federal_ruler_female:0 "President"
 federal_co_ruler:0 "Vice President"
 federal_co_ruler_female:0 "Vice President"

 titanate:0 "Titanate"
 titanate_desc:0 "Ruled by the divinely ordained rulers of Promethean Society, these powerful despots claim descent from various Titans worshiped by various Industrialists. They serve as priest-kings, responsible for securing the blessings of Industry and directing the labor of their subjects towards prosperity. Balancing religious and political authority, they act as intermediaries between the mortal realm and Industry, governing society and ensuring the harmonious interplay between divine forces and mortal endeavors."
 titanate_ruler:0 "Titan-King"
 titanate_ruler_female:0 "Titan-Queen"
 titanate_consort:0 "Titan-Queen"

 military_dictatorship:0 "Military Dictatorship"
 military_dictatorship_desc:0 "The military has seized power in this state, claiming legitimacy from military might, as well as divine ordination. The General or Dictator is the supreme leader of this state, abandoning all pretenses of democratic rule in favor of an absolute one."
 military_dictatorship_ruler:0 "General of the Army"
 military_dictatorship_ruler_female:0 "General of the Army"

 military_district:0 "Military District"
 military_district_desc:0 "Claiming legitmacy from the now long defunct Commands, various Military Districts dot the Western United States, ruling zones under martial law, of course all for the betterment of the local populous and eventual restoration of the Nation."
 military_district_ruler:0 "District Commander"
 military_district_ruler_female:0 "District Commander"
 